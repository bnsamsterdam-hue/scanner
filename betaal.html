<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Ticket Scanner PRO</title>

<link rel="icon" href="logo.png">
<link rel="apple-touch-icon" href="logo.png">
<meta name="theme-color" content="#000000">

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<style>
body{
margin:0;
background:#000;
color:#fff;
font-family:Arial,Helvetica,sans-serif;
text-align:center;
}

.wrap{
max-width:430px;
margin:auto;
padding:14px;
}

.hero{
width:100%;
max-width:320px;
margin:10px auto 20px;
display:block;
border-radius:18px;
}

h1{
font-size:30px;
color:#ffd700;
margin:5px 0;
}

.sub{
font-size:17px;
line-height:1.5;
opacity:.95;
margin-bottom:15px;
}

.langs{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:8px;
margin-bottom:18px;
}

.langs button{
padding:12px;
border:none;
border-radius:12px;
background:#111;
color:#fff;
font-size:16px;
font-weight:bold;
}

.card{
background:#111;
border:1px solid #333;
border-radius:18px;
padding:18px;
margin-bottom:14px;
box-shadow:0 0 15px rgba(255,215,0,.12);
}

.badge{
display:inline-block;
padding:6px 12px;
border-radius:20px;
font-size:12px;
font-weight:bold;
margin-bottom:8px;
background:#ffd700;
color:#000;
}

.badge2{
background:#ff6600;
color:#fff;
}

.price{
font-size:34px;
font-weight:bold;
color:#ffd700;
}

.name{
font-size:24px;
font-weight:bold;
margin-top:8px;
}

.desc{
margin-top:8px;
line-height:1.5;
opacity:.9;
}

.buy{
margin-top:14px;
width:100%;
padding:14px;
border:none;
border-radius:12px;
font-size:18px;
font-weight:bold;
background:#ffd700;
color:#000;
}

.cash{
background:#35c759;
color:#fff;
}

.footer{
padding:18px;
font-size:13px;
opacity:.65;
}
</style>
</head>

<body>

<div class="wrap">

<img src="plee's.png" class="hero">

<h1 id="title">The Plee's To Bee</h1>

<div class="sub" id="sub">
Te gebruiken op toegangspoorten én kassa<br>
Kies jouw toegang
</div>

<div class="langs">
<button onclick="setLang('nl')">🇳🇱 Nederlands</button>
<button onclick="setLang('en')">🇬🇧 English</button>
<button onclick="setLang('de')">🇩🇪 Deutsch</button>
<button onclick="setLang('fr')">🇫🇷 Français</button>
<button onclick="setLang('es')">🇪🇸 Español</button>
<button onclick="setLang('it')">🇮🇹 Italiano</button>
</div>

<!-- CASH -->
<div class="card" id="cashCard">
<div class="badge">⭐ DEAL</div>
<div class="price" id="cashPrijs">€1.00</div>
<div class="name" id="cashNaam">Contant betalen</div>
<div class="desc" id="cashDesc">Direct bij kassa</div>
<button class="buy cash" id="cashBtn">Bij Kassa</button>
</div>

<!-- ENKEL -->
<div class="card" id="singleCard">
<div class="price" id="singlePrijs">€1.50</div>
<div class="name" id="singleNaam">1 Toilet Bezoek</div>
<div class="desc" id="singleDesc">Direct op telefoon</div>
<button class="buy" onclick="pay('single')" id="buy1">Koop Nu</button>
</div>

<!-- DEEL -->
<div class="card" id="shareCard">
<div class="badge">⭐ POPULAIR</div>
<div class="price" id="sharePrijs">€10</div>
<div class="name" id="shareNaam">Deel Uw Toilet Pas</div>
<div class="desc" id="shareDesc">Samen gebruiken</div>
<button class="buy" onclick="pay('ten')" id="buy2">Koop Nu</button>
</div>

<!-- GROEP -->
<div class="card" id="groupCard">
<div class="badge badge2">🔥 BESTE DEAL</div>
<div class="price" id="groupPrijs">€20</div>
<div class="name" id="groupNaam">Familie Pas</div>
<div class="desc" id="groupDesc">Voor groepen</div>
<button class="buy" onclick="pay('twenty')" id="buy3">Koop Nu</button>
</div>

<div class="footer">
The Plee's To Bee 2026
</div>

</div>

<script>
firebase.initializeApp({
apiKey:"AIza...",
authDomain:"ticket-systeem-18a08.firebaseapp.com",
projectId:"ticket-systeem-18a08"
});

const db = firebase.firestore();

let adminData = {};
let currentLang = "nl";

/* LIVE DATABASE */
db.collection("instellingen").doc("winkel").onSnapshot(doc=>{
if(!doc.exists) return;
adminData = doc.data();
render();
});

/* RENDER */
function render(){

/* CASH */
if(adminData["contant geld"]){
let x = adminData["contant geld"];
setTxt("cashNaam", x.naam || txt.cashNaam[currentLang]);
setTxt("cashPrijs",
euro(x.prijs || x.price || "0,50"));
show("cashCard", x.zichtbaar !== false);
}

/* ENKEL */
if(adminData.enkel){
let x = adminData.enkel;
setTxt("singleNaam", x.naam || txt.singleNaam[currentLang]);
setTxt("singlePrijs","€"+(x.prijs || "1.50"));
show("singleCard", x.zichtbaar !== false);
}

/* DEEL */
if(adminData.deel){
let x = adminData.deel;
setTxt("shareNaam", x.naam || txt.shareNaam[currentLang]);
setTxt("sharePrijs","€"+(x.prijs || "10"));
show("shareCard", x.zichtbaar !== false);
}

/* GROEP */
if(adminData.groep){
let x = adminData.groep;
setTxt("groupNaam", x.naam || txt.groupNaam[currentLang]);
setTxt("groupPrijs","€"+(x.prijs || "20"));
show("groupCard", x.zichtbaar !== false);
}

applyLang();
}

/* TALEN */
const txt = {

sub:{
nl:"Te gebruiken op toegangspoorten én kassa<br>Kies jouw toegang",
en:"Use at gates and desk<br>Choose your access",
de:"Benutzung an Toren und Kasse<br>Wähle Zugang",
fr:"Utilisable aux portiques et caisse<br>Choisissez accès",
es:"Uso en puertas y caja<br>Elige acceso",
it:"Uso ai tornelli e cassa<br>Scegli accesso"
},

buy:{
nl:"Koop Nu",
en:"Buy Now",
de:"Jetzt Kaufen",
fr:"Acheter",
es:"Comprar",
it:"Compra"
},

cashNaam:{
nl:"Contant betalen",
en:"Cash Payment",
de:"Barzahlung",
fr:"Paiement Espèces",
es:"Pago en efectivo",
it:"Pagamento contanti"
},

singleNaam:{
nl:"1 Toilet Bezoek",
en:"1 Toilet Visit",
de:"1 Toilettenbesuch",
fr:"1 Visite Toilette",
es:"1 Visita Baño",
it:"1 Visita Toilette"
},

shareNaam:{
nl:"Deel Uw Toilet Pas",
en:"Shared Toilet Pass",
de:"Geteilter Toilettenpass",
fr:"Pass Toilette Partagé",
es:"Pase Compartido",
it:"Pass Condiviso"
},

groupNaam:{
nl:"Familie Pas",
en:"Family Pass",
de:"Familienpass",
fr:"Pass Famille",
es:"Pase Familiar",
it:"Pass Famiglia"
},

cashDesc:{
nl:"Direct bij kassa",
en:"Pay at desk",
de:"Direkt an Kasse",
fr:"Payer à la caisse",
es:"Pagar en caja",
it:"Pagare alla cassa"
},

singleDesc:{
nl:"Direct op telefoon",
en:"Instant on phone",
de:"Direkt aufs Telefon",
fr:"Direct sur téléphone",
es:"Directo al móvil",
it:"Diretto sul telefono"
},

shareDesc:{
nl:"Samen gebruiken",
en:"Use together",
de:"Gemeinsam nutzen",
fr:"À partager",
es:"Usar juntos",
it:"Da condividere"
},

groupDesc:{
nl:"Voor groepen",
en:"For groups",
de:"Für Gruppen",
fr:"Pour groupes",
es:"Para grupos",
it:"Per gruppi"
}

};

function setLang(x){
currentLang = x;
applyLang();
}

function applyLang(){

setHtml("sub", txt.sub[currentLang]);

setTxt("cashDesc", txt.cashDesc[currentLang]);
setTxt("singleDesc", txt.singleDesc[currentLang]);
setTxt("shareDesc", txt.shareDesc[currentLang]);
setTxt("groupDesc", txt.groupDesc[currentLang]);

setTxt("cashBtn", currentLang=="nl"?"Bij Kassa":
currentLang=="en"?"At Desk":
currentLang=="de"?"An Kasse":
currentLang=="fr"?"À la caisse":
currentLang=="es"?"En caja":"Alla cassa");

setTxt("buy1", txt.buy[currentLang]);
setTxt("buy2", txt.buy[currentLang]);
setTxt("buy3", txt.buy[currentLang]);

/* Alleen vertalen als admin leeg is */
if(!adminData["contant geld"]?.naam) setTxt("cashNaam", txt.cashNaam[currentLang]);
if(!adminData.enkel?.naam) setTxt("singleNaam", txt.singleNaam[currentLang]);
if(!adminData.deel?.naam) setTxt("shareNaam", txt.shareNaam[currentLang]);
if(!adminData.groep?.naam) setTxt("groupNaam", txt.groupNaam[currentLang]);

}

/* BETALEN */
async function pay(type){

try{

const r = await fetch("https://api-atygyvzjoq-uc.a.run.app/create-payment",{
method:"POST",
headers:{ "Content-Type":"application/json" },
body:JSON.stringify({type:type})
});

const data = await r.json();

if(data.checkoutUrl){
window.location.href = data.checkoutUrl;
}

}catch(e){
alert("Betaling tijdelijk niet beschikbaar");
}

}

/* HELPERS */
function setTxt(id,v){
document.getElementById(id).innerText=v;
}

function setHtml(id,v){
document.getElementById(id).innerHTML=v;
}

function show(id,on){
document.getElementById(id).style.display=on?"block":"none";
}
</script>

</body>
</html>
