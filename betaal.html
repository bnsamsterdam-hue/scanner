<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>The Plee's To Bee Toilet Pass</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
background:#000;
color:#fff;
text-align:center;
}

.wrap{
max-width:560px;
margin:auto;
padding:15px;
}

.hero{
width:100%;
border-radius:0 0 24px 24px;
box-shadow:0 0 25px rgba(255,213,74,0.20);
margin-bottom:20px;
}

h1{
font-size:30px;
color:#ffd54a;
margin-bottom:8px;
}

.sub{
font-size:18px;
line-height:1.5;
margin-bottom:12px;
}

.topline{
color:#ffd54a;
font-weight:bold;
font-size:16px;
margin-bottom:20px;
}

.langs{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
margin-bottom:20px;
}

.langs button{
padding:14px;
font-size:17px;
font-weight:bold;
border:none;
border-radius:14px;
background:#181818;
color:#fff;
cursor:pointer;
}

.card{
background:#111;
border:1px solid #333;
border-radius:18px;
padding:18px;
margin-bottom:16px;
box-shadow:0 0 12px rgba(255,213,74,0.12);
}

.badge{
padding:7px;
border-radius:10px;
font-weight:bold;
margin-bottom:12px;
font-size:14px;
}

.gold{background:#ffd54a;color:#000;}
.orange{background:#ff6b00;color:#fff;}

.name{
font-size:24px;
font-weight:bold;
margin-bottom:8px;
}

.desc{
font-size:15px;
line-height:1.5;
opacity:0.9;
margin-bottom:12px;
}

.price{
font-size:34px;
font-weight:bold;
color:#ffd54a;
margin-bottom:14px;
}

.buy{
width:100%;
padding:15px;
font-size:18px;
font-weight:bold;
border:none;
border-radius:14px;
background:linear-gradient(90deg,#ffd54a,#ffb300);
color:#000;
cursor:pointer;
animation:pulse 1.8s infinite;
}

.disabled{
background:#333;
color:#fff;
cursor:default;
animation:none;
}

.social{
background:#111;
border:1px solid #333;
padding:12px;
border-radius:14px;
margin-top:18px;
font-size:15px;
}

.footer{
font-size:13px;
opacity:0.55;
padding:22px 0 30px 0;
}

@keyframes pulse{
0%{transform:scale(1);}
50%{transform:scale(1.03);}
100%{transform:scale(1);}
}
</style>
</head>

<body>

<img src="plee's.png" class="hero">

<div class="wrap">


  
<script>
function setLang(x){
alert("Taal: " + x);
}

function pay(type){
if(type=="single"){ window.location.href="https://google.com"; }
if(type=="ten"){ window.location.href="https://google.com"; }
if(type=="twenty"){ window.location.href="https://google.com"; }
}
</script>
</body>
</html>
