<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>The Plee's To Bee</title>

<style>
body{
margin:0;
font-family:Arial,Helvetica,sans-serif;
background:#000;
color:#fff;
text-align:center;
}

.hero{
width:100%;
max-width:430px;
margin:15px auto;
display:block;
border-radius:18px;
}

.wrap{
max-width:430px;
margin:auto;
padding:10px;
}

h1{
color:#ffd700;
font-size:30px;
margin:8px 0;
}

.sub{
font-size:18px;
line-height:1.5;
margin-bottom:14px;
}

.langs{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:8px;
margin-bottom:18px;
}

.langs button{
padding:12px;
font-size:16px;
font-weight:bold;
border:none;
border-radius:12px;
background:#1c1c1c;
color:#fff;
cursor:pointer;
}

.card{
background:#111;
border:1px solid #333;
border-radius:18px;
padding:18px;
margin:12px 0;
box-shadow:0 0 12px rgba(255,215,0,.15);
}

.badge{
display:inline-block;
padding:5px 10px;
border-radius:20px;
font-size:12px;
font-weight:bold;
margin-bottom:8px;
background:#ffd700;
color:#000;
}

.badge2{
background:#ff6600;
color:#fff;
}

.price{
font-size:34px;
font-weight:bold;
color:#ffd700;
}

.name{
font-size:24px;
font-weight:bold;
margin-top:6px;
}

.desc{
line-height:1.5;
margin:10px 0;
opacity:.9;
}

.buy{
width:100%;
padding:14px;
border:none;
border-radius:12px;
font-size:18px;
font-weight:bold;
background:#ffd700;
color:#000;
cursor:pointer;
}

.cash{
background:#35c759;
color:#fff;
cursor:default;
}

.footer{
padding:20px;
font-size:13px;
opacity:.6;
}
</style>
</head>

<body>

<img src="plee's.png" class="hero">

<div class="wrap">

<h1>The Plee's To Bee</h1>

<div class="sub" id="sub"></div>

<div class="langs">
<button onclick="setLang('nl')">🇳🇱 Nederlands</button>
<button onclick="setLang('en')">🇬🇧 English</button>
<button onclick="setLang('de')">🇩🇪 Deutsch</button>
<button onclick="setLang('fr')">🇫🇷 Français</button>
<button onclick="setLang('es')">🇪🇸 Español</button>
<button onclick="setLang('it')">🇮🇹 Italiano</button>
</div>

<div class="card">
<div class="badge">⭐ Mega Deal</div>
<div class="price">€1,00</div>
<div class="name" id="cashname"></div>
<div class="desc" id="cashdesc"></div>
<button class="buy cash" id="cashbtn"></button>
</div>

<div class="card">
<div class="price">€1,50</div>
<div class="name" id="n1"></div>
<div class="desc" id="d1"></div>
<button class="buy" id="b1" onclick="pay('single')"></button>
</div>

<div class="card">
<div class="badge">⭐ Meest gekozen</div>
<div class="price">€10</div>
<div class="name" id="n2"></div>
<div class="desc" id="d2"></div>
<button class="buy" id="b2" onclick="pay('ten')"></button>
</div>

<div class="card">
<div class="badge badge2">🔥 Beste Deal</div>
<div class="price">€20</div>
<div class="name" id="n3"></div>
<div class="desc" id="d3"></div>
<button class="buy" id="b3" onclick="pay('twenty')"></button>
</div>

<div class="footer" id="footer"></div>

</div>

<script>
const texts = {

nl:{

cashname:"Cash Pass",
cashdesc:"1 bezoek<br>Bij kassa<br>Snelle toegang • Geen wachtrijen",
cashbtn:"Bij Kassa",
n1:"Single Pass",
d1:"1 bezoek<br>Direct op telefoon",
n2:"Share Pass",
d2:"10 bezoeken<br>Deelbaar met vrienden",
n3:"Group Pass",
d3:"20 bezoeken<br>Deelbaar met vrienden",
buy:"Koop Nu",
footer:"Vandaag kozen veel bezoekers The Plee's Pass",
error:"Betaling tijdelijk niet beschikbaar"
},

en:{
sub:"Use at gates and desk<br>Choose your access",
cashname:"Cash Pass",
cashdesc:"1 visit<br>At desk<br>Fast access • No waiting lines",
cashbtn:"At Desk",
n1:"Single Pass",
d1:"1 visit<br>Direct on phone",
n2:"Share Pass",
d2:"10 visits<br>Share with friends",
n3:"Group Pass",
d3:"20 visits<br>Share with friends",
buy:"Buy Now",
footer:"Many visitors chose The Plee's Pass today",
error:"Payment temporarily unavailable"
},

de:{
sub:"Nutzbar an Toren und Kasse<br>Wähle Zugang",
cashname:"Bar Pass",
cashdesc:"1 Besuch<br>An der Kasse<br>Schneller Zugang",
cashbtn:"An Kasse",
n1:"Einzel Pass",
d1:"1 Besuch<br>Direkt aufs Handy",
n2:"Share Pass",
d2:"10 Besuche<br>Teilbar mit Freunden",
n3:"Group Pass",
d3:"20 Besuche<br>Teilbar mit Freunden",
buy:"Jetzt Kaufen",
footer:"Viele Besucher wählten heute The Plee's Pass",
error:"Zahlung vorübergehend nicht verfügbar"
},

fr:{
sub:"Utilisable aux portiques et caisse<br>Choisissez accès",
cashname:"Pass Caisse",
cashdesc:"1 visite<br>À la caisse<br>Accès rapide",
cashbtn:"À la caisse",
n1:"Pass Simple",
d1:"1 visite<br>Direct sur téléphone",
n2:"Pass Partage",
d2:"10 visites<br>Partageable",
n3:"Pass Groupe",
d3:"20 visites<br>Partageable",
buy:"Acheter",
footer:"Beaucoup de visiteurs ont choisi The Plee's Pass",
error:"Paiement temporairement indisponible"
},

es:{
sub:"Usar en puertas y caja<br>Elige acceso",

},

}

};

let currentLang = "nl";

function setLang(lang){

currentLang = lang;
const t = texts[lang];

document.getElementById("sub").innerHTML = t.sub;
document.getElementById("cashname").innerHTML = t.cashname;
document.getElementById("cashdesc").innerHTML = t.cashdesc;
document.getElementById("cashbtn").innerHTML = t.cashbtn;

document.getElementById("n1").innerHTML = t.n1;
document.getElementById("d1").innerHTML = t.d1;

document.getElementById("n2").innerHTML = t.n2;
document.getElementById("d2").innerHTML = t.d2;

document.getElementById("n3").innerHTML = t.n3;
document.getElementById("d3").innerHTML = t.d3;

document.getElementById("b1").innerHTML = t.buy;
document.getElementById("b2").innerHTML = t.buy;
document.getElementById("b3").innerHTML = t.buy;

document.getElementById("footer").innerHTML = t.footer;
}

async function pay(type){

try{

const r = await fetch("https://api-atygyvzjoq-uc.a.run.app/create-payment",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body: JSON.stringify({
type:type
})
});

const data = await r.json();

if(data.checkoutUrl){
window.location.href = data.checkoutUrl;
}else{
alert(texts[currentLang].error);
}

}catch(e){
alert(texts[currentLang].error);
}

}

setLang("nl");
</script>

</body>
</html>
