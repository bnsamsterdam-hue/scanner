<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Ticket Scanner PRO</title>

<link rel="icon" href="logo.png">
<link rel="apple-touch-icon" href="logo.png">
<meta name="theme-color" content="#000000">

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<style>
body{
margin:0;
background:#000;
color:#fff;
font-family:Arial,Helvetica,sans-serif;
text-align:center;
}

.wrap{
max-width:430px;
margin:auto;
padding:15px;
}

.hero{
width:100%;
max-width:320px;
border-radius:18px;
margin:10px auto 20px;
display:block;
}

h1{
color:#ffd700;
font-size:30px;
margin:5px 0;
}

.sub{
font-size:17px;
opacity:.9;
line-height:1.5;
margin-bottom:15px;
}

.langs{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:8px;
margin-bottom:18px;
}

.langs button{
padding:12px;
border:none;
border-radius:12px;
background:#111;
color:#fff;
font-size:16px;
font-weight:bold;
}

.card{
background:#111;
border:1px solid #333;
border-radius:18px;
padding:18px;
margin-bottom:14px;
box-shadow:0 0 15px rgba(255,215,0,.10);
}

.badge{
display:inline-block;
padding:6px 12px;
border-radius:20px;
font-size:12px;
font-weight:bold;
margin-bottom:8px;
background:#ffd700;
color:#000;
}

.badge2{
background:#ff6600;
color:#fff;
}

.price{
font-size:34px;
font-weight:bold;
color:#ffd700;
}

.name{
font-size:24px;
font-weight:bold;
margin-top:8px;
}

.desc{
margin-top:8px;
line-height:1.5;
opacity:.9;
}

.buy{
margin-top:14px;
width:100%;
padding:14px;
font-size:18px;
font-weight:bold;
border:none;
border-radius:12px;
background:#ffd700;
color:#000;
}

.cash{
background:#35c759;
color:#fff;
}

.footer{
padding:20px;
font-size:13px;
opacity:.6;
}
</style>
</head>

<body>

<div class="wrap">

<img src="plee's.png" class="hero">

<h1 id="title">The Plee's To Bee</h1>

<div class="sub" id="sub">
Toegangspoorten én kassa<br>Kies jouw toegang
</div>

<div class="langs">
<button onclick="setLang('nl')">🇳🇱 Nederlands</button>
<button onclick="setLang('en')">🇬🇧 English</button>
<button onclick="setLang('de')">🇩🇪 Deutsch</button>
<button onclick="setLang('fr')">🇫🇷 Français</button>
<button onclick="setLang('es')">🇪🇸 Español</button>
<button onclick="setLang('it')">🇮🇹 Italiano</button>
</div>

<!-- CASH -->
<div class="card" id="cashCard">
<div class="badge">⭐ DEAL</div>
<div class="price" id="cashPrijs">€1.00</div>
<div class="name" id="cashNaam">Contant betalen</div>
<div class="desc" id="cashDesc">Direct bij kassa</div>
<button class="buy cash" id="cashBtn">Bij Kassa</button>
</div>

<!-- SINGLE -->
<div class="card" id="singleCard">
<div class="price" id="singlePrijs">€1.50</div>
<div class="name" id="singleNaam">1 Toilet Bezoek</div>
<div class="desc" id="singleDesc">Direct op telefoon</div>
<button class="buy" onclick="pay('single')" id="buy1">Koop Nu</button>
</div>

<!-- SHARE -->
<div class="card" id="shareCard">
<div class="badge">⭐ POPULAIR</div>
<div class="price" id="sharePrijs">€10</div>
<div class="name" id="shareNaam">Deel Uw Toilet Pas</div>
<div class="desc" id="shareDesc">Samen gebruiken</div>
<button class="buy" onclick="pay('ten')" id="buy2">Koop Nu</button>
</div>

<!-- GROUP -->
<div class="card" id="groupCard">
<div class="badge badge2">🔥 BESTE DEAL</div>
<div class="price" id="groupPrijs">€20</div>
<div class="name" id="groupNaam">Familie Pas</div>
<div class="desc" id="groupDesc">Voor groepen</div>
<button class="buy" onclick="pay('twenty')" id="buy3">Koop Nu</button>
</div>

<div class="footer">
The Plee's To Bee 2026
</div>

</div>

<script>
firebase.initializeApp({
apiKey:"AIza...",
authDomain:"ticket-systeem-18a08.firebaseapp.com",
projectId:"ticket-systeem-18a08"
});

const db = firebase.firestore();

/* LIVE SETTINGS */
db.collection("instellingen").doc("winkel")
.onSnapshot(doc=>{

if(!doc.exists) return;

let d = doc.data();

/* CASH */
if(d["contant geld"]){
document.getElementById("cashNaam").innerText = d["contant geld"].naam || "Contant";
document.getElementById("cashPrijs").innerText = "€" + (d["contant geld"].prijs || "1.00");
document.getElementById("cashCard").style.display =
d["contant geld"].zichtbaar ? "block":"none";
}

/* SINGLE */
if(d.single){
document.getElementById("singleNaam").innerText = d.single.naam || "";
document.getElementById("singlePrijs").innerText = "€" + (d.single.prijs || "");
document.getElementById("singleCard").style.display =
d.single.zichtbaar ? "block":"none";
}

/* SHARE */
if(d.deel){
document.getElementById("shareNaam").innerText = d.deel.naam || "";
document.getElementById("sharePrijs").innerText = "€" + (d.deel.prijs || "");
document.getElementById("shareCard").style.display =
d.deel.zichtbaar ? "block":"none";
}

/* GROUP */
if(d.groep){
document.getElementById("groupNaam").innerText = d.groep.naam || "";
document.getElementById("groupPrijs").innerText = "€" + (d.groep.prijs || "");
document.getElementById("groupCard").style.display =
d.groep.zichtbaar ? "block":"none";
}

});

/* BETALEN */
async function pay(type){

try{

let r = await fetch("https://api-atygyvzjoq-uc.a.run.app/create-payment",{
method:"POST",
headers:{ "Content-Type":"application/json" },
body:JSON.stringify({type:type})
});

let data = await r.json();

if(data.checkoutUrl){
window.location.href = data.checkoutUrl;
}

}catch(e){
alert("Betaling tijdelijk niet beschikbaar");
}

}

/* TALEN */
function setLang(x){

if(x=="nl"){
buyTxt("Koop Nu");
document.getElementById("sub").innerHTML="Toegangspoorten én kassa<br>Kies jouw toegang";
}

if(x=="en"){
buyTxt("Buy Now");
document.getElementById("sub").innerHTML="Entrance gates and desk<br>Choose access";
}

if(x=="de"){
buyTxt("Jetzt Kaufen");
document.getElementById("sub").innerHTML="Eingangstore und Kasse<br>Zugang wählen";
}

if(x=="fr"){
buyTxt("Acheter");
document.getElementById("sub").innerHTML="Portiques et caisse<br>Choisissez accès";
}

if(x=="es"){
buyTxt("Comprar");
document.getElementById("sub").innerHTML="Puertas y caja<br>Elige acceso";
}

if(x=="it"){
buyTxt("Compra");
document.getElementById("sub").innerHTML="Entrata e cassa<br>Scegli accesso";
}

}

function buyTxt(t){
document.getElementById("buy1").innerText=t;
document.getElementById("buy2").innerText=t;
document.getElementById("buy3").innerText=t;
}
</script>

</body>
</html>
