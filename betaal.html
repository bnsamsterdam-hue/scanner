/* =========================
   EURO FIX V5
========================= */
function euro(v){

if(v === undefined || v === null || v === ""){
return "€0,00";
}

v = String(v).trim();

/* komma naar punt */
v = v.replace(",", ".");

let n = parseFloat(v);

if(isNaN(n)){
return "€0,00";
}

return "€" + n.toFixed(2).replace(".", ",");
}

/* =========================

========================= */
async function pay(type){

const r = await fetch(
"https://api-atygyvzjoq-uc.a.run.app/create-payment",
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({type:type})
});

const data = await r.json();

if(data.checkoutUrl){
window.location.href =
data.checkoutUrl;
}

}catch(e){

alert("Betaling tijdelijk niet beschikbaar");

}

}

function show(id,on){
