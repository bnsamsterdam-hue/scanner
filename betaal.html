<style>
 #notice{

border:1px solid #333;

}

}
.langs{

}
.langs button{

.card{

.badge{

}
.badge2{

color:#fff;
}
.price{

}
.name{

}
.desc{
margin-top:8px;
line-height:1.45;
opacity:.92;
}
.buy{
width:100%;
margin-top:14px;
padding:14px;
border:none;
border-radius:12px;
font-size:18px;
font-weight:bold;
background:#ffd700;
color:#000;
cursor:pointer;
}
.cash{
background:#35c759;
color:#fff;
}
.footer{
padding:18px;
font-size:13px;
opacity:.65;
}
</style>
</head>
<body>

<div class="wrap">

<img src="plee's.png" class="hero">
<h1 id="title"> De toiletpas die je wél wilt delen</h1>
  
<div class="sub" id="sub">
Jouw snelle toegang bij poort en kassa<br>
</div>

  <div id="notice"></div> 
  
<div class="langs">
<button onclick="setLang('nl')">🇳🇱 Nederlands</button>
<button onclick="setLang('en')">🇬🇧 English</button>
<button onclick="setLang('de')">🇩🇪 Deutsch</button>
<button onclick="setLang('fr')">🇫🇷 Français</button>
<button onclick="setLang('es')">🇪🇸 Español</button>
<button onclick="setLang('it')">🇮🇹 Italiano</button>
</div>

<!-- CASH -->
<div class="card" id="cashCard">
<div class="badge">⭐ DEAL</div>
<div class="price" id="cashPrijs">€1,00</div>
<div class="name" id="cashNaam">Contant betalen</div>
<div class="desc" id="cashDesc">Direct bij kassa</div>
<button class="buy cash" id="cashBtn">Bij Kassa</button>
</div>

<!-- SINGLE -->
<div class="card" id="singleCard">
<div class="price" id="singlePrijs">€1,50</div>
<div class="name" id="singleNaam">1 Toilet Bezoek</div>
<div class="desc" id="singleDesc">Direct op telefoon</div>
<button class="buy" onclick="pay('single')" id="buy1">Koop Nu</button>
</div>

<!-- SHARE -->
<div class="card" id="shareCard">
<div class="badge">⭐ POPULAIR</div>
<div class="price" id="sharePrijs">€10,00</div>
<div class="name" id="shareNaam">Deel Uw Toilet Pas</div>
<div class="desc" id="shareDesc">Samen gebruiken</div>
<button class="buy" onclick="pay('ten')" id="buy2">Koop Nu</button>
</div>

<!-- GROUP -->
<div class="card" id="groupCard">
<div class="badge badge2">🔥 BESTE DEAL</div>
<div class="price" id="groupPrijs">€20,00</div>
<div class="name" id="groupNaam">Familie Pas</div>
<div class="desc" id="groupDesc">Voor groepen</div>
<button class="buy" onclick="pay('twenty')" id="buy3">Koop Nu</button>
</div>

<div class="footer">The Plee's To Bee</div>

</div>

<script>
firebase.initializeApp({
apiKey:"AIza...",
authDomain:"ticket-systeem-18a08.firebaseapp.com",
projectId:"ticket-systeem-18a08"
});

const db = firebase.firestore();

let data = {};
let lang = "nl";

/* LIVE ADMIN KOPPELING */
db.collection("settings").doc("shop").onSnapshot(doc=>{
if(!doc.exists) return;
data = doc.data() || {};
render();
});

/* FORMAT PRIJS */
function euro(v){
if(v===undefined || v===null || v==="") return "€0,00";
v = String(v).replace(",",".");
let n = parseFloat(v);
if(isNaN(n)) n = 0;
return "€" + n.toFixed(2).replace(".",",");
}

/* TALEN */
const txt = {
notice:{
nl:"Bij online betaling kunnen servicekosten van toepassing zijn, afhankelijk van uw bank of betaalmethode. Contante betaling is <b>kosteloos aan de kassa</b>.",
en:"Service costs may apply for online payments, depending on your bank or payment method. Cash payment is <b>free of charge at the cashier desk</b>.",
de:"Bei Online-Zahlungen können Servicekosten anfallen, abhängig von Ihrer Bank oder Zahlungsmethode. Barzahlung ist <b>kostenlos an der Kasse</b>.",
fr:"Des frais de service peuvent s’appliquer pour les paiements en ligne, selon votre banque ou mode de paiement. Le paiement en espèces est <b>gratuit à la caisse</b>.",
es:"Pueden aplicarse costes de servicio en pagos online, según su banco o método de pago. El pago en efectivo es <b>gratuito en caja</b>.",
it:"Possono essere applicati costi di servizio per pagamenti online, in base alla banca o metodo di pagamento. Il pagamento in contanti è <b>gratuito alla cassa</b>."
},
sub:{
nl:"Te gebruiken op toegangspoorten én kassa<br>Kies jouw toegang",
en:"Use at gates and desk<br>Choose your access",
de:"Benutzung an Toren und Kasse<br>Wähle Zugang",
fr:"Utilisable aux portiques et caisse<br>Choisissez accès",
es:"Uso en puertas y caja<br>Elige acceso",
it:"Uso ai tornelli e cassa<br>Scegli accesso"
},
buy:{
nl:"Koop Nu",
en:"Buy Now",
de:"Jetzt Kaufen",
fr:"Acheter",
es:"Comprar",
it:"Compra"
},
cashBtn:{
nl:"Bij Kassa",
en:"At Desk",
de:"An Kasse",
fr:"À la caisse",
es:"En caja",
it:"Alla cassa"
},
cashNaam:{
nl:"Contant betaling",
en:"Cash Payment",
de:"Barzahlung",
fr:"Paiement espèces",
es:"Pago en efectivo",
it:"Pagamento contanti"
},
singleNaam:{
nl:"1 Toilet Bezoek",
en:"1 Toilet Visit",
de:"1 Toilettenbesuch",
fr:"1 Visite Toilette",
es:"1 Visita Baño",
it:"1 Visita Toilette"
},
shareNaam:{
nl:"10 Keer Opluchten 🚽",
en:"10 Times Relief 🚽",
de:"10 Mal Erleichterung 🚽",
fr:"10 Fois Soulagement 🚽",
es:"10 Veces Alivio 🚽",
it:"10 Volte Sollievo 🚽"
},

groupNaam:{
nl:"20x Marathon Pas 🚽",
en:"20x Marathon Pass 🚽",
de:"20x Marathon Pass 🚽",
fr:"20x Pass Marathon 🚽",
es:"20x Pase Maratón 🚽",
it:"20x Pass Maratona 🚽"
},
cashDesc:{
nl:"Direct bij kassa",
en:"Pay at desk",
de:"Direkt an Kasse",
fr:"Payer à la caisse",
es:"Pagar en caja",
it:"Pagare alla cassa"
},
singleDesc:{
nl:"Direct op telefoon",
en:"Instant on phone",
de:"Direkt aufs Telefon",
fr:"Direct sur téléphone",
es:"Directo al móvil",
it:"Diretto sul telefono"
},
shareDesc:{
nl:"Deelbaar via WhatsApp",
en:"Shareable via WhatsApp",
de:"Teilbar über WhatsApp",
fr:"Partageable via WhatsApp",
es:"Compartible por WhatsApp",
it:"Condivisibile tramite WhatsApp"
},
title:{
nl:"De toiletpas die je wél wilt delen",
en:"The toilet pass you'll actually want to share",
de:"Der Toilettenpass, den man wirklich teilen möchte",
fr:"Le pass toilette que vous voudrez vraiment partager",
es:"El pase de baño que sí querrás compartir",
it:"Il pass toilette che vorrai davvero condividere"
  
},
groupDesc:{
nl:"Deelbaar via WhatsApp",
en:"Shareable via WhatsApp",
de:"Teilbar über WhatsApp",
fr:"Partageable via WhatsApp",
es:"Compartible por WhatsApp",
it:"Condivisibile tramite WhatsApp"
}
};
function setLang(x){
lang = x;
render();
}

/* HOOFD RENDER */
function render(){

/* CASH */
let cash = data.cash || {};
setTxt("cashPrijs", euro(cash.prijs || "1"));
setTxt("cashNaam", cash.naam || txt.cashNaam[lang]);
show("cashCard", cash.visible !== false);

/* SINGLE */
let single = data.single || {};
setTxt("singlePrijs", euro(single.prijs || "1.50"));
setTxt("singleNaam", single.naam || txt.singleNaam[lang]);
show("singleCard", single.visible !== false);

/* SHARE */
let share = data.share || {};
setTxt("sharePrijs", euro(share.prijs || "10"));
setTxt("shareNaam", share.naam || txt.shareNaam[lang]);
show("shareCard", share.visible !== false);

/* GROUP */
let group = data.group || {};
setTxt("groupPrijs", euro(group.prijs || "20"));
setTxt("groupNaam", group.naam || txt.groupNaam[lang]);
show("groupCard", group.visible !== false);

applyLang();
}

function applyLang(){

setTxt("title", txt.title[lang]);
setHtml("sub", txt.sub[lang]);
setTxt("notice", txt.notice[lang]);

setTxt("cashDesc", txt.cashDesc[lang]);
setTxt("singleDesc", txt.singleDesc[lang]);
setTxt("shareDesc", txt.shareDesc[lang]);
setTxt("groupDesc", txt.groupDesc[lang]);

setTxt("cashBtn", txt.cashBtn[lang]);

setTxt("buy1", txt.buy[lang]);
setTxt("buy2", txt.buy[lang]);
setTxt("buy3", txt.buy[lang]);

}

/* BETALING */
async function pay(type){
try{

const r = await fetch(
"https://api-atygyvzjoq-uc.a.run.app/create-payment",
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
type:type,
lang:lang
})
}
);

const j = await r.json();

if(j.checkoutUrl){
window.location.href = j.checkoutUrl;
}else{
alert("Betaling tijdelijk niet beschikbaar");
}

}catch(e){
alert("Betaling tijdelijk niet beschikbaar");
}
}

/* HELPERS */
function setTxt(id,v){
document.getElementById(id).innerText = v;
}

function setHtml(id,v){
document.getElementById(id).innerHTML = v;
}

function show(id,on){
document.getElementById(id).style.display = on ? "block" : "none";
}

/* START */
render();

</script>

</body>
</html>
