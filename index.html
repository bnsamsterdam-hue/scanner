<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ticket Systeem PRO</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body {
  background:#111;
  color:white;
  font-family:Arial;
  text-align:center;
  margin:0;
}

/* STATUS GROOT EN BOVEN */
#status {
  font-size:32px;
  padding:15px;
  margin:10px;
  border-radius:10px;
}

.ok { background:green; }
.fout { background:red; }

.blink { animation: blink 1s infinite; }
@keyframes blink { 50% { opacity:0.3; } }

#reader {
  width:100%;
  max-width:350px;
  margin:auto;
}

/* NOOD ONDERAAN */
#nood {
  position:fixed;
  bottom:10px;
  width:100%;
}

.noodBtn {
  background:red;
  padding:10px;
  margin:5px;
  color:white;
  border:none;
}

.noodBtn.open { background:green; }

/* MENU */
#menu {
  position:fixed;
  top:0;
  width:100%;
  height:100%;
  background:black;
  display:flex;
  justify-content:center;
  align-items:center;
}

button {
  padding:10px 20px;
  margin:5px;
}
</style>
</head>

<body>

<h2>🎟️ Scanner</h2>

<!-- STATUS DIRECT BOVEN -->
<div id="status">Wacht op scan...</div>

<!-- CAMERA -->
<div id="reader"></div>

<!-- NOOD ONDER -->
<div id="nood" style="display:none;">
<button class="noodBtn" onclick="nood(1)">Poort 1</button>
<button class="noodBtn" onclick="nood(2)">Poort 2</button>
<button class="noodBtn" onclick="nood(3)">Poort 3</button>
<button class="noodBtn" onclick="nood(4)">Poort 4</button>
</div>

<!-- MENU -->
<div id="menu">
<button onclick="startKassa()">📱 KASSA</button>
</div>

<input id="scanInput" autofocus>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, runTransaction } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const app = initializeApp({
apiKey:"AIza...",
authDomain:"ticket-systeem-18a08.firebaseapp.com",
projectId:"ticket-systeem-18a08"
});

const db = getFirestore(app);

const POORTEN = {
1:"192.168.1.50",
2:"192.168.1.51",
3:"192.168.1.52",
4:"192.168.1.53"
};

let MODE="";
let RELAIS_IP="";

// 🔊 geluid
function beep(){
new Audio("https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg").play();
}

// 📱 KASSA
window.startKassa=()=>{
MODE="kassa";

document.getElementById("menu").style.display="none";
document.getElementById("nood").style.display="block";

new Html5QrcodeScanner("reader",{fps:10,qrbox:250}).render(processScan);
};

// 🚪 POORT
function startPoort(nr){
MODE="poort";
RELAIS_IP=POORTEN[nr];

document.getElementById("menu").style.display="none";

setTimeout(()=>document.getElementById("scanInput").focus(),200);
}

// 🚨 NOOD
window.nood=(nr)=>{
let b=event.target;
b.classList.add("open");

fetch("http://"+POORTEN[nr]+"/relay/0?turn=on&timer=2");

setTimeout(()=>b.classList.remove("open"),2000);
};

// 🔍 SCAN INPUT
document.getElementById("scanInput").addEventListener("change",function(){
processScan(this.value);
this.value="";
});

// 🔍 SCAN FUNCTION
async function processScan(code){

code = code.trim().toUpperCase();
let status = document.getElementById("status");

try{
await runTransaction(db, async (t)=>{
let ref = doc(db,"tickets",code);
let snap = await t.get(ref);

if(!snap.exists()) throw "fout";

let r = snap.data().remaining;
if(r<=0) throw "op";

t.update(ref,{remaining:r-1});

status.className="ok";
status.innerText="OK "+(r-1);
});

beep();

if(MODE==="poort"){
fetch("http://"+RELAIS_IP+"/relay/0?turn=on&timer=1");
}

}catch(e){
status.className="fout blink";
status.innerText = e==="op"?"OP":"ONGELDIG";
beep();
}

setTimeout(()=>{
status.innerText="Wacht op scan...";
status.className="";
},2000);
}

// 🔥 AUTO POORT
const params=new URLSearchParams(window.location.search);
if(params.get("poort")){
window.onload=()=>startPoort(Number(params.get("poort")));
}

</script>

</body>
</html>
