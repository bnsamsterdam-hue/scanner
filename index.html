<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PRO Ticket Systeem</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body { font-family: Arial; text-align:center; background:#111; color:white; }

#reader { width:320px; margin:20px auto; }

#status {
  font-size:30px;
  padding:20px;
  border-radius:10px;
  margin-top:20px;
}

.ok { background:green; }
.fout { background:red; }

button { padding:12px 20px; margin:5px; font-size:16px; }
input { padding:10px; margin:5px; font-size:16px; }

.screen {
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:black;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

#scanInput {
  opacity:0;
  position:absolute;
}

.noodBtn {
  background:red;
  color:white;
  font-size:18px;
}

.noodBtn.open {
  background:green;
}
</style>
</head>

<body>

<h1 id="title">🎟️ Ticket Systeem</h1>

<!-- MODUS -->
<div id="modeScreen" class="screen">
  <h2>Kies modus</h2>
  <button onclick="startKassa()">📱 KASSA</button>
  <button onclick="showPoorten()">🚪 POORT</button>
</div>

<!-- POORT SELECT -->
<div id="poortScreen" class="screen" style="display:none;">
  <h2>Kies poort</h2>
  <button onclick="startPoort(1)">Poort 1</button>
  <button onclick="startPoort(2)">Poort 2</button>
  <button onclick="startPoort(3)">Poort 3</button>
  <button onclick="startPoort(4)">Poort 4</button>
</div>

<div id="reader"></div>
<input id="scanInput" autofocus>

<div id="status">Wacht op scan...</div>

<!-- 🔙 TERUG -->
<button onclick="gaNaarStart()">⬅ Terug naar start</button>

<!-- 🚨 NOOD -->
<div id="noodPanel" style="display:none;">
  <h2>🚨 NOOD OPEN</h2>
  <button id="btn1" class="noodBtn" onclick="noodOpen(1)">Poort 1</button>
  <button id="btn2" class="noodBtn" onclick="noodOpen(2)">Poort 2</button>
  <button id="btn3" class="noodBtn" onclick="noodOpen(3)">Poort 3</button>
  <button id="btn4" class="noodBtn" onclick="noodOpen(4)">Poort 4</button>
</div>

<br>
<button onclick="openLogin()">🔒 Admin</button>

<div id="admin" style="display:none;">
<h2>Event</h2>
<input id="eventnaam" placeholder="Bijv PRIDE2026"><br>

<h2>Ticket</h2>
<input id="code" placeholder="Code"><br>
<input id="aantal" type="number" placeholder="Aantal"><br>
<button onclick="maakTicket()">Opslaan</button>

<h2>Bulk</h2>
<button onclick="genereerTickets()">Genereer 3000</button>
</div>

<!-- LOGIN -->
<div id="loginScreen" class="screen" style="display:none;">
  <h2>Voer pincode in</h2>
  <input type="password" id="pinInput"><br><br>
  <button onclick="checkPin()">OK</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, setDoc, runTransaction } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyB8rljH8WmRih061v56YFjl60SXhgJBYfc",
  authDomain: "ticket-systeem-18a08.firebaseapp.com",
  projectId: "ticket-systeem-18a08",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// POORT IP'S
const POORTEN = {
  1: "192.168.1.50",
  2: "192.168.1.51",
  3: "192.168.1.52",
  4: "192.168.1.53"
};

let MODE = "";
let RELAIS_IP = "";

// geluid
function beep() {
  new Audio("https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg").play();
}

// login
window.openLogin = () => document.getElementById("loginScreen").style.display = "flex";

window.checkPin = () => {
  let pin = document.getElementById("pinInput").value.trim();
  if (pin === "8760") {
    document.getElementById("loginScreen").style.display = "none";
    document.getElementById("admin").style.display = "block";
  } else alert("❌ Verkeerde pincode");
  document.getElementById("pinInput").value = "";
};

// start kassa
window.startKassa = () => {
  MODE = "kassa";
  document.getElementById("modeScreen").style.display = "none";
  document.getElementById("reader").style.display = "block";
  document.getElementById("noodPanel").style.display = "none";
  startCamera();
};

// poorten
window.showPoorten = () => {
  document.getElementById("modeScreen").style.display = "none";
  document.getElementById("poortScreen").style.display = "flex";
};

window.startPoort = (nr) => {
  MODE = "poort";
  RELAIS_IP = POORTEN[nr];

  document.getElementById("poortScreen").style.display = "none";
  document.getElementById("scanInput").style.display = "block";
  document.getElementById("noodPanel").style.display = "block";

  document.getElementById("title").innerText = "🚪 Poort " + nr;
  document.getElementById("scanInput").focus();
};

// nood open
window.noodOpen = function(nr) {

  let btn = document.getElementById("btn" + nr);
  let ip = POORTEN[nr];

  btn.classList.add("open");

  fetch("http://" + ip + "/relay/0?turn=on&timer=1")
    .then(() => {
      let status = document.getElementById("status");
      status.className = "ok";
      status.innerText = "🚨 Poort " + nr + " geopend";
    })
    .catch(() => alert("Relais fout"));

  // terug naar rood na 2 sec
  setTimeout(() => {
    btn.classList.remove("open");
  }, 2000);
};

// terug knop
window.gaNaarStart = function() {

  document.getElementById("modeScreen").style.display = "flex";
  document.getElementById("poortScreen").style.display = "none";
  document.getElementById("reader").style.display = "none";
  document.getElementById("scanInput").style.display = "none";
  document.getElementById("noodPanel").style.display = "none";
  document.getElementById("admin").style.display = "none";

  document.getElementById("title").innerText = "🎟️ Ticket Systeem";
  document.getElementById("status").innerText = "Wacht op scan...";
  document.getElementById("status").className = "";

  MODE = "";
  RELAIS_IP = "";
};

// tickets
window.maakTicket = async () => {
  let code = document.getElementById("code").value.trim().toUpperCase();
  let aantal = parseInt(document.getElementById("aantal").value, 10);
  await setDoc(doc(db, "tickets", code), { remaining: aantal });
  alert("Opgeslagen");
};

// bulk
window.genereerTickets = async () => {
  let event = document.getElementById("eventnaam").value.trim().toUpperCase();
  if (!event) return alert("Voer event naam in");

  for (let i = 1; i <= 3000; i++) {
    let nr = String(i).padStart(6, '0');
    let code = "TOILETBEZOEK " + event + "-" + nr;
    await setDoc(doc(db, "tickets", code), { remaining: 10 });
  }

  alert("3000 tickets gemaakt");
};

// scan veilig
async function processScan(code) {

  code = code.trim().toUpperCase();
  let status = document.getElementById("status");
  let ref = doc(db, "tickets", code);

  try {
    await runTransaction(db, async (transaction) => {
      let snap = await transaction.get(ref);

      if (!snap.exists()) throw "ongeldig";

      let remaining = Number(snap.data().remaining);
      if (remaining <= 0) throw "op";

      transaction.update(ref, { remaining: remaining - 1 });

      status.className = "ok";
      status.innerText = "✅ OK - " + (remaining - 1);
    });

    beep();

    if (MODE === "poort" && RELAIS_IP) {
      fetch("http://" + RELAIS_IP + "/relay/0?turn=on&timer=1");
    }

  } catch (e) {
    status.className = "fout";
    status.innerText = e === "op" ? "⛔ Op" : "❌ Ongeldig";
    beep();
  }

  setTimeout(() => {
    status.innerText = "Wacht op scan...";
    status.className = "";
  }, 2000);
}

// camera
function startCamera() {
  new Html5QrcodeScanner("reader", { fps: 10, qrbox: 250 })
    .render(processScan);
}

// keyboard scanner
document.getElementById("scanInput").addEventListener("change", function() {
  processScan(this.value);
  this.value = "";
});

</script>

</body>
</html>
