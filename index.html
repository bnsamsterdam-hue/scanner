<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Scanner PRO</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body { background:#000; color:white; font-family:Arial; margin:0; text-align:center; }

#tabs button {
  width:24%;
  padding:10px;
  font-size:14px;
}

.tab { display:none; padding:10px; }
.active { display:block; }

#status { font-size:28px; padding:10px; border-radius:10px; }
.ok { background:green; }
.fout { background:red; }

#reader { max-width:300px; margin:auto; }

.noodBtn { background:red; padding:10px; margin:5px; }
.noodBtn.open { background:green; }

.blink { animation: blink 1s infinite; }
@keyframes blink { 50% { opacity:0.3; } }

.led { padding:10px; margin:5px; }
</style>
</head>

<body>

<div id="tabs">
<button onclick="showTab('scan')">Scan</button>
<button onclick="showTab('teller')">Teller</button>
<button onclick="showTab('storing')">Storingen</button>
<button onclick="showTab('admin')">Admin</button>
</div>

<!-- SCAN -->
<div id="scan" class="tab active">
<div id="status">SCAN KLAAR</div>
<div id="reader"></div>

<div id="nood">
<button class="noodBtn" onclick="nood(1)">P1</button>
<button class="noodBtn" onclick="nood(2)">P2</button>
<button class="noodBtn" onclick="nood(3)">P3</button>
<button class="noodBtn" onclick="nood(4)">P4</button>
</div>
</div>

<!-- TELLER -->
<div id="teller" class="tab">
<h2>Totaal scans</h2>
<h1 id="tellerWaarde">0</h1>
<button onclick="resetTeller()">Reset</button>
</div>

<!-- STORING -->
<div id="storing" class="tab">
<h2>Poorten</h2>
<div id="p1" class="led">Poort 1</div>
<div id="p2" class="led">Poort 2</div>
<div id="p3" class="led">Poort 3</div>
<div id="p4" class="led">Poort 4</div>
</div>

<!-- ADMIN -->
<div id="admin" class="tab">
<div id="login">
<input id="pin" placeholder="PIN">
<button onclick="login()">OK</button>
</div>

<div id="adminPanel" style="display:none;">
<input id="eventnaam" placeholder="Event"><br>
<input id="code" placeholder="Code"><br>
<input id="aantal" placeholder="Aantal"><br>
<button onclick="maakTicket()">Opslaan</button>
<button onclick="bulk()">Bulk</button>
<button onclick="logout()">Terug</button>
</div>
</div>

<input id="scanInput" autofocus>

<script>

const POORTEN={
1:"192.168.1.50",
2:"192.168.1.51",
3:"192.168.1.52",
4:"192.168.1.53"
};

let teller=0;
let MODE="kassa";
let RELAIS_IP="";

/* TABS */
function showTab(id){
document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
document.getElementById(id).classList.add('active');
}

/* SCANNER */
let scanner;

function startCamera(){
scanner = new Html5Qrcode("reader");
Html5Qrcode.getCameras().then(cameras=>{
if(cameras.length){
scanner.start(cameras[0].id,{fps:10,qrbox:200},code=>processScan(code));
}
});
}
startCamera();

/* USB scanner */
document.getElementById("scanInput").addEventListener("change",function(){
processScan(this.value);
this.value="";
});

/* SCAN */
async function processScan(code){

code=code.trim().toUpperCase();
let s=document.getElementById("status");

try{

// 🔥 FIREBASE SIMULATIE (hier blijft jouw echte code staan)
let r=10; // tijdelijk test

s.className="ok";
s.innerText="✔ TOEGANG ("+(r-1)+")";

teller++;
document.getElementById("tellerWaarde").innerText=teller;

if(MODE==="poort"){
fetch("http://"+RELAIS_IP+"/relay/0?turn=on&timer=1");
}

}catch{
s.className="fout";
s.innerText="❌ ONGELDIG";
}

setTimeout(()=>{
s.innerText="SCAN KLAAR";
s.className="";
},1500);
}

/* NOOD */
function nood(n){
fetch("http://"+POORTEN[n]+"/relay/0?turn=on&timer=2");
}

/* TELLER */
function resetTeller(){
teller=0;
document.getElementById("tellerWaarde").innerText=0;
}

/* ADMIN */
function login(){
if(document.getElementById("pin").value==="8760"){
document.getElementById("login").style.display="none";
document.getElementById("adminPanel").style.display="block";
}
}

function logout(){
location.reload();
}

function maakTicket(){ alert("Opslaan werkt (koppel Firebase)"); }
function bulk(){ alert("Bulk werkt (koppel Firebase)"); }

/* STORING */
async function check(){
for(let i=1;i<=4;i++){
let el=document.getElementById("p"+i);
try{
await fetch("http://"+POORTEN[i]+"/status");
el.style.background="green";
el.innerText="Poort "+i+" OK";
el.classList.remove("blink");
}catch{
el.style.background="red";
el.innerText="Poort "+i+" STORING";
el.classList.add("blink");
}
}
}
setInterval(check,3000);

/* POORT MODE */
const params=new URLSearchParams(window.location.search);
if(params.get("poort")){
MODE="poort";
RELAIS_IP=POORTEN[params.get("poort")];
document.getElementById("tabs").style.display="none";
document.getElementById("nood").style.display="none";
}

</script>

</body>
</html>
