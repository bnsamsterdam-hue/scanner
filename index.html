<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PRO Ticket Systeem</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body { font-family: Arial; text-align:center; background:#111; color:white; }

#reader { width:320px; margin:20px auto; }

#status {
  font-size:30px;
  padding:20px;
  border-radius:10px;
  margin-top:20px;
}

.ok { background:green; }
.fout { background:red; }

button { padding:12px 20px; margin:5px; font-size:16px; }

#scanInput { opacity:0; position:absolute; }

.noodBtn { background:red; color:white; }
.noodBtn.open { background:green; }

.screen {
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:black;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}
</style>
</head>

<body>

<h1>🎟️ Ticket Systeem</h1>

<!-- MENU -->
<div id="menu" class="screen">
  <button onclick="startKassa()">📱 KASSA</button>
</div>

<!-- KASSA -->
<div id="kassa" style="display:none;">
  <div id="reader"></div>
</div>

<!-- POORT -->
<input id="scanInput" autofocus>

<div id="status">Wacht op scan...</div>

<!-- NOOD -->
<div id="nood" style="display:none;">
  <h2>🚨 NOOD OPEN</h2>
  <button class="noodBtn" onclick="openPoort(1)">Poort 1</button>
  <button class="noodBtn" onclick="openPoort(2)">Poort 2</button>
  <button class="noodBtn" onclick="openPoort(3)">Poort 3</button>
  <button class="noodBtn" onclick="openPoort(4)">Poort 4</button>
</div>

<!-- ADMIN -->
<button onclick="openLogin()">🔒 Admin</button>

<div id="admin" style="display:none;">
  <h2>Event</h2>
  <input id="eventnaam" placeholder="Event"><br>

  <h2>Handmatig ticket</h2>
  <input id="code" placeholder="Code"><br>
  <input id="aantal" type="number" placeholder="Aantal"><br>
  <button onclick="maakTicket()">Opslaan</button>

  <h2>Bulk</h2>
  <button onclick="genereerTickets()">Genereer 3000</button>
</div>

<div id="loginScreen" class="screen" style="display:none;">
  <input type="password" id="pinInput"><br>
  <button onclick="checkPin()">OK</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, setDoc, runTransaction } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyB8rljH8WmRih061v56YFjl60SXhgJBYfc",
  authDomain: "ticket-systeem-18a08.firebaseapp.com",
  projectId: "ticket-systeem-18a08",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// 🔥 POORTEN
const POORTEN = {
  1: "192.168.1.50",
  2: "192.168.1.51",
  3: "192.168.1.52",
  4: "192.168.1.53"
};

// 🔥 URL
const params = new URLSearchParams(window.location.search);
const autoPoort = params.get("poort");

let MODE = "";
let RELAIS_IP = "";

// 🔊 geluid
function beep() {
  new Audio("https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg").play();
}

// 📱 KASSA
window.startKassa = () => {
  MODE = "kassa";
  document.getElementById("menu").style.display = "none";
  document.getElementById("kassa").style.display = "block";
  document.getElementById("nood").style.display = "block";

  new Html5QrcodeScanner("reader",{fps:10,qrbox:250}).render(processScan);
};

// 🚪 POORT AUTO
function startPoort(nr){
  MODE = "poort";
  RELAIS_IP = POORTEN[nr];

  document.getElementById("menu").style.display = "none";

  setTimeout(()=>document.getElementById("scanInput").focus(),300);
}

// 🚨 NOOD
window.openPoort = (nr)=>{
  fetch("http://"+POORTEN[nr]+"/relay/0?turn=on&timer=1");
};

// 🔍 SCAN (poort scanner)
document.getElementById("scanInput").addEventListener("change",function(){
  processScan(this.value);
  this.value="";
});

// 🔍 SCAN FUNCTION
async function processScan(code){

  code = code.trim().toUpperCase();
  let status = document.getElementById("status");

  try{
    await runTransaction(db, async (t)=>{
      let ref = doc(db,"tickets",code);
      let snap = await t.get(ref);

      if(!snap.exists()) throw "fout";

      let r = snap.data().remaining;
      if(r<=0) throw "op";

      t.update(ref,{remaining:r-1});

      status.className="ok";
      status.innerText="OK "+(r-1);
    });

    beep();

    if(MODE==="poort"){
      fetch("http://"+RELAIS_IP+"/relay/0?turn=on&timer=1");
    }

  }catch(e){
    status.className="fout";
    status.innerText = e==="op"?"OP":"ONGELDIG";
    beep();
  }

  setTimeout(()=>{
    status.innerText="Wacht op scan...";
    status.className="";
  },2000);
}

// 🔒 ADMIN
window.openLogin = ()=>document.getElementById("loginScreen").style.display="flex";

window.checkPin = ()=>{
  if(document.getElementById("pinInput").value==="8760"){
    document.getElementById("admin").style.display="block";
    document.getElementById("loginScreen").style.display="none";
  }
};

// ➕ TICKET
window.maakTicket = async ()=>{
  let code=document.getElementById("code").value.toUpperCase();
  let aantal=parseInt(document.getElementById("aantal").value);
  await setDoc(doc(db,"tickets",code),{remaining:aantal});
};

// ⚡ BULK
window.genereerTickets = async ()=>{
  let event=document.getElementById("eventnaam").value.toUpperCase();
  for(let i=1;i<=3000;i++){
    let nr=String(i).padStart(6,"0");
    await setDoc(doc(db,"tickets","TOILETBEZOEK "+event+"-"+nr),{remaining:10});
  }
};

// 🔥 AUTO POORT
if(autoPoort){
  window.onload=()=>startPoort(Number(autoPoort));
}

</script>

</body>
</html>
