<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Scanner PRO Tabs</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body { background:#000; color:white; font-family:Arial; margin:0; text-align:center; }

#tabs button {
  width:24%;
  padding:10px;
  font-size:14px;
}

.tab { display:none; padding:10px; }

.active { display:block; }

/* STATUS */
#status {
  font-size:30px;
  padding:10px;
  border-radius:10px;
}

.ok { background:green; }
.fout { background:red; }

/* CAMERA */
#reader { max-width:300px; margin:auto; }

/* NOOD */
.noodBtn { background:red; padding:10px; margin:5px; }
.noodBtn.open { background:green; }

/* STORING */
.blink { animation: blink 1s infinite; }
@keyframes blink { 50% { opacity:0.3; } }
</style>
</head>

<body>

<!-- TABS -->
<div id="tabs">
<button onclick="showTab('scan')">Scanner</button>
<button onclick="showTab('teller')">Teller</button>
<button onclick="showTab('storing')">Storingen</button>
<button onclick="showTab('admin')">Admin</button>
</div>

<!-- SCANNER -->
<div id="scan" class="tab active">
<div id="status">SCAN KLAAR</div>
<div id="reader"></div>

<div>
<button class="noodBtn" onclick="nood(1)">P1</button>
<button class="noodBtn" onclick="nood(2)">P2</button>
<button class="noodBtn" onclick="nood(3)">P3</button>
<button class="noodBtn" onclick="nood(4)">P4</button>
</div>
</div>

<!-- TELLER -->
<div id="teller" class="tab">
<h2>Aantal scans</h2>
<h1 id="tellerWaarde">0</h1>
<button onclick="resetTeller()">Reset</button>
</div>

<!-- STORING -->
<div id="storing" class="tab">
<h2>Poort status</h2>
<div id="p1">🔴 Poort 1</div>
<div id="p2">🔴 Poort 2</div>
<div id="p3">🔴 Poort 3</div>
<div id="p4">🔴 Poort 4</div>
</div>

<!-- ADMIN -->
<div id="admin" class="tab">
<div id="login">
<input type="password" id="pin" placeholder="PIN">
<button onclick="login()">OK</button>
</div>

<div id="adminPanel" style="display:none;">
<h3>Event</h3>
<input id="eventnaam"><br>

<h3>Ticket</h3>
<input id="code"><br>
<input id="aantal"><br>
<button onclick="maakTicket()">Opslaan</button>

<h3>Bulk</h3>
<button onclick="bulk()">3000 maken</button>

<button onclick="logout()">Terug</button>
</div>
</div>

<input id="scanInput" autofocus>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, setDoc, runTransaction } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const app = initializeApp({
apiKey:"AIza...",
authDomain:"ticket-systeem-18a08.firebaseapp.com",
projectId:"ticket-systeem-18a08"
});

const db = getFirestore(app);

const POORTEN={
1:"192.168.1.50",
2:"192.168.1.51",
3:"192.168.1.52",
4:"192.168.1.53"
};

let teller=0;
let MODE="kassa";
let RELAIS_IP="";

function showTab(id){
document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
document.getElementById(id).classList.add('active');
}

/* SCANNER */
let scanner=new Html5Qrcode("reader");

Html5Qrcode.getCameras().then(cameras=>{
if(cameras.length){
scanner.start(cameras[0].id,{fps:10,qrbox:200},code=>processScan(code));
}
});

/* USB SCANNER */
document.getElementById("scanInput").addEventListener("change",function(){
processScan(this.value);
this.value="";
});

/* SCAN */
async function processScan(code){

code=code.trim().toUpperCase();
let s=document.getElementById("status");

try{
await runTransaction(db, async (t)=>{
let ref=doc(db,"tickets",code);
let snap=await t.get(ref);

if(!snap.exists()) throw "fout";
let r=snap.data().remaining;
if(r<=0) throw "op";

t.update(ref,{remaining:r-1});

s.className="ok";
s.innerText="✔ TOEGANG ("+(r-1)+")";
});

teller++;
document.getElementById("tellerWaarde").innerText=teller;

}catch(e){
s.className="fout";
s.innerText=e==="op"?"❌ OP":"❌ ONGELDIG";
}

setTimeout(()=>{
s.innerText="SCAN KLAAR";
s.className="";
},1500);
}

/* NOOD */
window.nood=(n)=>fetch("http://"+POORTEN[n]+"/relay/0?turn=on&timer=2");

/* TELLER */
window.resetTeller=()=>{teller=0;document.getElementById("tellerWaarde").innerText=0;}

/* ADMIN */
window.login=()=>{
if(document.getElementById("pin").value==="8760"){
document.getElementById("login").style.display="none";
document.getElementById("adminPanel").style.display="block";
}
};
window.logout=()=>location.reload();

window.maakTicket=async()=>{
await setDoc(doc(db,"tickets",document.getElementById("code").value.toUpperCase()),{
remaining:parseInt(document.getElementById("aantal").value)
});
};

window.bulk=async()=>{
let e=document.getElementById("eventnaam").value.toUpperCase();
for(let i=1;i<=3000;i++){
await setDoc(doc(db,"tickets","EV-"+e+"-"+i),{remaining:10});
}
};

/* STORING */
async function check(){
for(let i=1;i<=4;i++){
let el=document.getElementById("p"+i);
try{
let r=await fetch("http://"+POORTEN[i]+"/status");
el.innerText="🟢 Poort "+i;
el.classList.remove("blink");
}catch{
el.innerText="🔴 STORING "+i;
el.classList.add("blink");
}
}
}
setInterval(check,3000);

</script>

</body>
</html>
