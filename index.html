<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PRO ULTRA Scanner</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body { background:#000; color:white; font-family:Arial; text-align:center; margin:0; }

/* STATUS */
#status {
  font-size:40px;
  padding:15px;
  margin:10px;
  border-radius:10px;
}
.ok { background:#00c853; }
.fout { background:#d50000; }

.flash-green { background:#003300 !important; }
.flash-red { background:#330000 !important; }

#reader {
  width:100%;
  max-width:260px;
  margin:10px auto;
}

/* mobiel optimalisatie */
@media (max-width: 600px) {

  #status {
    font-size:28px;
    position:sticky;
    top:0;
    z-index:10;
  }

  #reader {
    max-width:220px;
  }

  h2 {
    font-size:20px;
  }
}

#scanInput { opacity:0; position:absolute; }

/* NOOD */
#nood {
  position:fixed;
  bottom:10px;
  width:100%;
}
.noodBtn { background:red; padding:10px; margin:5px; }
.noodBtn.open { background:green; }

/* STATUS POORTEN */
#poortStatus div { margin:5px; }
.blink { animation: blink 1s infinite; }
@keyframes blink { 50% { opacity:0.3; } }

button { padding:10px 15px; margin:5px; }

/* MENU */
#menu {
  position:fixed;
  top:0;
  width:100%;
  height:100%;
  background:black;
  display:flex;
  justify-content:center;
  align-items:center;
}
</style>
</head>

<body>

<h2>🎟️ Scanner</h2>

<div id="status">SCAN KLAAR</div>

<!-- POORT STATUS -->
<div id="poortStatus">
<div id="p1">🔴 Poort 1</div>
<div id="p2">🔴 Poort 2</div>
<div id="p3">🔴 Poort 3</div>
<div id="p4">🔴 Poort 4</div>
</div>

<!-- CAMERA -->
<div id="reader"></div>

<!-- NOOD -->
<div id="nood" style="display:none;">
<button class="noodBtn" onclick="nood(1)">Poort 1</button>
<button class="noodBtn" onclick="nood(2)">Poort 2</button>
<button class="noodBtn" onclick="nood(3)">Poort 3</button>
<button class="noodBtn" onclick="nood(4)">Poort 4</button>
</div>

<!-- MENU -->
<div id="menu">
<button onclick="startKassa()">📱 KASSA</button>
</div>

<input id="scanInput" autofocus>

<!-- ADMIN -->
<button onclick="openLogin()">🔒 Admin</button>

<div id="admin" style="display:none;">
<h3>Event</h3>
<input id="eventnaam" placeholder="Bijv PRIDE2026"><br>

<h3>Ticket</h3>
<input id="code" placeholder="Bijv TOILET-001"><br>
<input id="aantal" placeholder="Bijv 10"><br>
<button onclick="maakTicket()">Opslaan</button>

<h3>Bulk</h3>
<button onclick="genereerTickets()">Genereer 3000</button>

<h3>Teller</h3>
<span id="teller">0</span><br>
<button onclick="resetTeller()">Reset</button>

<button onclick="gaTerug()">⬅ Terug</button>
</div>

<div id="loginScreen" style="display:none;">
<input type="password" id="pinInput">
<button onclick="checkPin()">OK</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, setDoc, runTransaction } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const app = initializeApp({
apiKey:"AIza...",
authDomain:"ticket-systeem-18a08.firebaseapp.com",
projectId:"ticket-systeem-18a08"
});

const db = getFirestore(app);

const POORTEN = {
1:"192.168.1.50",
2:"192.168.1.51",
3:"192.168.1.52",
4:"192.168.1.53"
};

let teller=0;
let MODE="";
let RELAIS_IP="";

// 🔊 geluid
function beep(){
new Audio("https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg").play();
}

// 🔥 flash
function flash(type){
let b=document.body;
if(type==="ok"){
b.classList.add("flash-green");
setTimeout(()=>b.classList.remove("flash-green"),200);
}else{
b.classList.add("flash-red");
setTimeout(()=>b.classList.remove("flash-red"),200);
}
}

// 📱 KASSA
window.startKassa=()=>{
MODE="kassa";

document.getElementById("menu").style.display="none";
document.getElementById("nood").style.display="block";

new Html5QrcodeScanner("reader",{fps:10,qrbox:250}).render(processScan);
};

// 🚪 POORT
function startPoort(nr){
MODE="poort";
RELAIS_IP=POORTEN[nr];

document.getElementById("menu").style.display="none";

setTimeout(()=>document.getElementById("scanInput").focus(),200);
}

// 🚨 NOOD
window.nood=(nr)=>{
let b=event.target;
b.classList.add("open");

fetch("http://"+POORTEN[nr]+"/relay/0?turn=on&timer=2");

setTimeout(()=>b.classList.remove("open"),2000);
};

// 🔍 scan input
document.getElementById("scanInput").addEventListener("change",function(){
processScan(this.value);
this.value="";
});

// 🔍 scan
async function processScan(code){

code=code.trim().toUpperCase();
let status=document.getElementById("status");

try{
await runTransaction(db, async (t)=>{
let ref=doc(db,"tickets",code);
let snap=await t.get(ref);

if(!snap.exists()) throw "fout";

let r=snap.data().remaining;
if(r<=0) throw "op";

t.update(ref,{remaining:r-1});

status.className="ok";
status.innerText="✔ TOEGANG ("+(r-1)+" over)";
});

teller++;
document.getElementById("teller").innerText=teller;

beep();
flash("ok");

if(MODE==="poort"){
fetch("http://"+RELAIS_IP+"/relay/0?turn=on&timer=1");
}

}catch(e){
status.className="fout";
status.innerText=e==="op"
  ? "❌ GEEN BEURTEN MEER"
  : "❌ ONGELDIGE KAART";

beep();
flash("fout");
}

setTimeout(()=>{
status.innerText="SCAN KLAAR";
status.className="";
},1500);
}

// 🔒 admin
window.openLogin=()=>document.getElementById("loginScreen").style.display="block";

window.checkPin=()=>{
if(document.getElementById("pinInput").value==="8760"){
document.getElementById("admin").style.display="block";
document.getElementById("loginScreen").style.display="none";
}
};

// ➕ ticket
window.maakTicket=async()=>{
let code=document.getElementById("code").value.toUpperCase();
let aantal=parseInt(document.getElementById("aantal").value);
await setDoc(doc(db,"tickets",code),{remaining:aantal});
};

// ⚡ bulk
window.genereerTickets=async()=>{
let event=document.getElementById("eventnaam").value.toUpperCase();
for(let i=1;i<=3000;i++){
let nr=String(i).padStart(6,"0");
await setDoc(doc(db,"tickets","TOILETBEZOEK "+event+"-"+nr),{remaining:10});
}
};

// 🔄 reset
window.resetTeller=()=>{
teller=0;
document.getElementById("teller").innerText="0";
};

// 🔙 terug
window.gaTerug=()=>location.reload();

// 🔥 status check
async function checkPoorten(){
for(let i=1;i<=4;i++){
let el=document.getElementById("p"+i);
try{
let r=await fetch("http://"+POORTEN[i]+"/status");
el.innerText=r.ok?"🟢 Poort "+i+" OK":"🔴 Poort "+i;
el.classList.remove("blink");
}catch{
el.innerText="🔴 STORING "+i;
el.classList.add("blink");
}
}
}
setInterval(checkPoorten,3000);

// 🔥 auto poort
const params=new URLSearchParams(window.location.search);
if(params.get("poort")){
window.onload=()=>startPoort(Number(params.get("poort")));
}

</script>

</body>
</html>
