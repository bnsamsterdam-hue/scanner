<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PRO Scanner</title>

<style>
body { background:#111; color:white; text-align:center; font-family:Arial; }
#status { font-size:40px; margin-top:20px; padding:20px; border-radius:10px; }
.ok { background:green; }
.fout { background:red; }
#scanInput { opacity:0; position:absolute; }
button { padding:15px; font-size:18px; margin:5px; }
</style>
</head>

<body>

<h1>🎟️ Scanner</h1>

<div id="menu">
  <button onclick="startKassa()">📱 KASSA</button>
  <button onclick="startPoort(1)">🚪 POORT</button>
</div>

<div id="status">Wacht op scan...</div>

<input id="scanInput" autofocus>

<div id="nood" style="display:none;">
  <h2>🚨 NOOD</h2>
  <button onclick="openPoort(1)">Poort 1</button>
  <button onclick="openPoort(2)">Poort 2</button>
  <button onclick="openPoort(3)">Poort 3</button>
  <button onclick="openPoort(4)">Poort 4</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, runTransaction } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyB8rljH8WmRih061v56YFjl60SXhgJBYfc",
  authDomain: "ticket-systeem-18a08.firebaseapp.com",
  projectId: "ticket-systeem-18a08",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// 🔥 POORT IP'S
const POORTEN = {
  1: "192.168.1.50",
  2: "192.168.1.51",
  3: "192.168.1.52",
  4: "192.168.1.53"
};

// 🔥 URL AUTO MODE
const params = new URLSearchParams(window.location.search);
const autoPoort = params.get("poort");

let MODE = "";
let RELAIS_IP = "";

// 🔊 geluid
function beep() {
  new Audio("https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg").play();
}

// 🚪 START POORT
window.startPoort = (nr) => {
  MODE = "poort";
  RELAIS_IP = POORTEN[nr];

  document.getElementById("menu").style.display = "none";
  document.getElementById("nood").style.display = "block";

  setTimeout(() => {
    document.getElementById("scanInput").focus();
  }, 300);
};

// 📱 KASSA
window.startKassa = () => {
  MODE = "kassa";
  document.getElementById("menu").style.display = "none";
};

// 🚨 NOOD OPEN
window.openPoort = (nr) => {
  fetch("http://" + POORTEN[nr] + "/relay/0?turn=on&timer=1");
};

// 🔍 SCAN
document.getElementById("scanInput").addEventListener("change", async function(){

  let code = this.value.trim().toUpperCase();
  this.value = "";

  let status = document.getElementById("status");

  try{
    await runTransaction(db, async (t)=>{
      let ref = doc(db,"tickets",code);
      let snap = await t.get(ref);

      if(!snap.exists()) throw "fout";

      let r = snap.data().remaining;
      if(r<=0) throw "op";

      t.update(ref,{remaining:r-1});

      status.className="ok";
      status.innerText="OK - "+(r-1);
    });

    beep();

    if(MODE==="poort"){
      fetch("http://"+RELAIS_IP+"/relay/0?turn=on&timer=1");
    }

  }catch(e){
    status.className="fout";
    status.innerText = e==="op"?"OP":"ONGELDIG";
    beep();
  }

  setTimeout(()=>{
    status.innerText="Wacht op scan...";
    status.className="";
  },2000);

});

// 🔥 AUTO START POORT
if(autoPoort){
  window.onload = () => startPoort(Number(autoPoort));
}

</script>

</body>
</html>
