<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PRO Ticket Systeem</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body { font-family: Arial; text-align:center; background:#111; color:white; }

#reader { width:320px; margin:20px auto; }

#status {
  font-size:30px;
  padding:20px;
  border-radius:10px;
  margin-top:20px;
}

.ok { background:green; }
.fout { background:red; }

button { padding:12px 20px; margin:5px; font-size:16px; }

.screen {
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:black;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

#scanInput {
  opacity:0;
  position:absolute;
}

.noodBtn {
  background:red;
  color:white;
  font-size:18px;
}

.noodBtn.open {
  background:green;
}

.poortDot {
  font-size:20px;
  margin:5px;
}
</style>
</head>

<body>

<h1 id="title">🎟️ Ticket Systeem</h1>

<!-- POORT STATUS -->
<div>
  Poorten:
  <span id="p1" class="poortDot">🔴</span>1
  <span id="p2" class="poortDot">🔴</span>2
  <span id="p3" class="poortDot">🔴</span>3
  <span id="p4" class="poortDot">🔴</span>4
</div>

<!-- MODUS -->
<div id="modeScreen" class="screen">
  <h2>Kies modus</h2>
  <button onclick="startKassa()">📱 KASSA</button>
  <button onclick="showPoorten()">🚪 POORT</button>
</div>

<!-- POORT SELECT -->
<div id="poortScreen" class="screen" style="display:none;">
  <h2>Kies poort</h2>
  <button onclick="startPoort(1)">Poort 1</button>
  <button onclick="startPoort(2)">Poort 2</button>
  <button onclick="startPoort(3)">Poort 3</button>
  <button onclick="startPoort(4)">Poort 4</button>
</div>

<div id="reader"></div>
<input id="scanInput" autofocus>

<div id="status">Wacht op scan...</div>

<!-- 🔙 TERUG (ALTIJD ZICHTBAAR) -->
<button onclick="gaNaarStart()">⬅ Terug</button>

<!-- 🚨 NOOD -->
<div id="noodPanel" style="display:none;">
  <h2>🚨 NOOD OPEN</h2>
  <button id="btn1" class="noodBtn" onclick="noodOpen(1)">Poort 1</button>
  <button id="btn2" class="noodBtn" onclick="noodOpen(2)">Poort 2</button>
  <button id="btn3" class="noodBtn" onclick="noodOpen(3)">Poort 3</button>
  <button id="btn4" class="noodBtn" onclick="noodOpen(4)">Poort 4</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, setDoc, runTransaction } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyB8rljH8WmRih061v56YFjl60SXhgJBYfc",
  authDomain: "ticket-systeem-18a08.firebaseapp.com",
  projectId: "ticket-systeem-18a08",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const POORTEN = {
  1: "192.168.1.50",
  2: "192.168.1.51",
  3: "192.168.1.52",
  4: "192.168.1.53"
};

let MODE = "";
let RELAIS_IP = "";

// geluid
function beep() {
  new Audio("https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg").play();
}

// visueel groen maken
function setPoortGroen(nr){
  document.getElementById("p"+nr).innerText = "🟢";
}

// KASSA
window.startKassa = () => {
  MODE = "kassa";
  document.getElementById("modeScreen").style.display = "none";
  document.getElementById("reader").style.display = "block";
  document.getElementById("noodPanel").style.display = "none";
  startCamera();
};

// POORT SELECT
window.showPoorten = () => {
  document.getElementById("modeScreen").style.display = "none";
  document.getElementById("poortScreen").style.display = "flex";
};

// START POORT
window.startPoort = (nr) => {
  MODE = "poort";
  RELAIS_IP = POORTEN[nr];

  document.getElementById("poortScreen").style.display = "none";
  document.getElementById("scanInput").style.display = "block";
  document.getElementById("noodPanel").style.display = "block";

  document.getElementById("title").innerText = "🚪 Poort " + nr;
  document.getElementById("scanInput").focus();
};

// 🚨 NOOD OPEN (5 sec)
window.noodOpen = (nr) => {

  let btn = document.getElementById("btn"+nr);

  btn.classList.add("open"); // groen

  fetch("http://" + POORTEN[nr] + "/relay/0?turn=on&timer=5");

  setPoortGroen(nr);

  setTimeout(() => {
    btn.classList.remove("open"); // terug rood
  }, 5000);
};

// TERUG
window.gaNaarStart = () => location.reload();

// SCAN
async function processScan(code){

  let ref = doc(db,"tickets",code.trim().toUpperCase());
  let status = document.getElementById("status");

  try{
    await runTransaction(db, async (t)=>{
      let snap = await t.get(ref);
      if(!snap.exists()) throw "fout";
      let r = snap.data().remaining;
      if(r<=0) throw "op";
      t.update(ref,{remaining:r-1});
      status.className="ok";
      status.innerText="OK "+(r-1);
    });

    beep();

    if(MODE==="poort"){
      fetch("http://"+RELAIS_IP+"/relay/0?turn=on&timer=5");
    }

  }catch(e){
    status.className="fout";
    status.innerText = e==="op"?"OP":"ONGELDIG";
    beep();
  }
}

// camera
function startCamera(){
  new Html5QrcodeScanner("reader",{fps:10,qrbox:250}).render(processScan);
}

// scanner input
document.getElementById("scanInput").addEventListener("change",function(){
  processScan(this.value);
  this.value="";
});

</script>

</body>
</html>
