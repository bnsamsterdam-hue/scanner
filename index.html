<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Scanner PRO FINAL</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body { background:#000; color:white; font-family:Arial; margin:0; text-align:center; }

#tabs button { width:20%; padding:10px; font-size:14px; }

.tab { display:none; padding:10px; }
.active { display:block; }

#status { font-size:28px; padding:10px; border-radius:10px; }
.ok { background:green; }
.fout { background:red; }

#reader { max-width:300px; margin:auto; }

/* NOOD */
.noodBtn {
  background:red;
  padding:12px;
  margin:5px;
  font-size:16px;
  color:white;
}
.noodBtn.open { background:green; }

/* STORING */
.led {
  padding:10px;
  margin:5px;
}
.blink { animation: blink 1s infinite; }
@keyframes blink { 50% { opacity:0.3; } }

</style>
</head>

<body>

<!-- TABS -->
<div id="tabs">
<button onclick="showTab('scan QR code')">Scan</button>
<button onclick="showTab('nood')">Nood</button>
<button onclick="showTab('teller')">Teller</button>
<button onclick="showTab('storing')">Storingen</button>
<button onclick="showTab('admin')">Admin</button>
</div>

<!-- SCAN -->
<div id="scan" class="tab active">
<div id="status">SCAN KLAAR</div>
<div id="reader"></div> 
<button onclick="switchCamera()">🔄 Camera achter</button>  
</div>

<!-- NOOD -->
<div id="nood" class="tab">
<h2>🚨 NOOD OPEN</h2>
<button class="noodBtn" onclick="nood(1,this)">Poort 1</button>
<button class="noodBtn" onclick="nood(2,this)">Poort 2</button>
<button class="noodBtn" onclick="nood(3,this)">Poort 3</button>
<button class="noodBtn" onclick="nood(4,this)">Poort 4</button>
</div>

<!-- TELLER -->
<div id="teller" class="tab">
<h2>Totaal scans</h2>
<h1 id="tellerWaarde">0</h1>
<button onclick="resetTeller()">Reset</button>
</div>

<!-- STORING -->
<div id="storing" class="tab">
<h2>Poorten status</h2>
<div id="p1" class="led">Poort 1</div>
<div id="p2" class="led">Poort 2</div>
<div id="p3" class="led">Poort 3</div>
<div id="p4" class="led">Poort 4</div>
</div>

<!-- ADMIN -->
<div id="admin" class="tab">
<div id="login">
<input id="pin" type="password" placeholder="Voer pincode in">
<button onclick="login()">OK</button>
</div>

<div id="adminPanel" style="display:none;">

<h3>Event</h3>
<input id="eventnaam" placeholder="Bijv PRIDE2026"><br>

<h3>Ticket</h3>
<input id="code" placeholder="Bijv TOILET-001 altijd hoofdletters"><br>
<input id="aantal" placeholder="Bijv 10"><br>

<button onclick="maakTicket()">Opslaan</button>

<h3>Bulk</h3>
<p>Maakt codes zoals: EVENT-000001</p>
<button onclick="bulk()">Genereer 3000</button>

<button onclick="logout()">⬅ Terug</button>

</div>
</div>

<input id="scanInput" autofocus>
input {
  background:#222;
  color:white;
  border:1px solid #555;
  padding:8px;
  margin:5px;
}
<script>

const POORTEN={
1:"192.168.1.50",
2:"192.168.1.51",
3:"192.168.1.52",
4:"192.168.1.53"
};

let teller=0;
let MODE="kassa";
let RELAIS_IP="";

/* TABS */
function showTab(id){
document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
document.getElementById(id).classList.add('active');
}

/* CAMERA */
let scanner;
let cameras=[];
let currentCam=0;

let scanner;
let cameras=[];
let currentCam=0;

Html5Qrcode.getCameras().then(cam=>{
  cameras = cam;

  if(cameras.length){
    startCamera(0);
  }
});

function startCamera(index){

  if(scanner){
    scanner.stop();
  }

  scanner = new Html5Qrcode("reader");

  scanner.start(
    cameras[index].id,
    { fps:10, qrbox:200 },
    code => processScan(code)
  );
}

  function switchCamera(){
  currentCam = (currentCam + 1) % cameras.length;
  startCamera(currentCam);
}

/* USB scanner */
document.getElementById("scanInput").addEventListener("change",function(){
processScan(this.value);
this.value="";
});

/* SCAN */
async function processScan(code){

let s=document.getElementById("status");

try{
let r=10;

s.className="ok";
s.innerText="✔ TOEGANG ("+(r-1)+")";

teller++;
document.getElementById("tellerWaarde").innerText=teller;

}catch{
s.className="fout";
s.innerText="❌ ONGELDIG";
}

setTimeout(()=>{
s.innerText="SCAN KLAAR";
s.className="";
},1500);
}

/* NOOD */
function nood(n,btn){
btn.classList.add("open");

fetch("http://"+POORTEN[n]+"/relay/0?turn=on&timer=3");

setTimeout(()=>btn.classList.remove("open"),3000);
}

/* TELLER */
function resetTeller(){
teller=0;
document.getElementById("tellerWaarde").innerText=0;
}

/* ADMIN */
function login(){
if(document.getElementById("pin").value==="8760"){
document.getElementById("login").style.display="none";
document.getElementById("adminPanel").style.display="block";
}
}

function logout(){
location.reload();
}

function maakTicket(){ alert("Koppel Firebase"); }
function bulk(){ alert("Bulk maken"); }

/* STORING */
async function check(){
for(let i=1;i<=4;i++){
let el=document.getElementById("p"+i);

try{
let r=await fetch("http://"+POORTEN[i]+"/status");

if(r.ok){
el.innerText="🟢 Poort "+i+" OK";
el.style.background="green";
}else{
throw "fout";
}

}catch(e){
el.innerText="🔴 Poort "+i+" GEEN VERBINDING";
el.style.background="red";
el.classList.add("blink");
}
}
}
setInterval(check,3000);

/* POORT MODE */
const params=new URLSearchParams(window.location.search);
if(params.get("poort")){
MODE="poort";
RELAIS_IP=POORTEN[params.get("poort")];
document.getElementById("tabs").style.display="none";
}

</script>

</body>
</html>
