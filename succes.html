<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Betaling succesvol</title>

<style>
body{
margin:0;
padding:20px;
background:#000;
color:#fff;
font-family:Arial,Helvetica,sans-serif;
text-align:center;
}

.wrap{
max-width:430px;
margin:auto;
}

.logo{
width:100%;
max-width:320px;
margin:20px auto;
display:block;
}

.box{
background:#111;
border:1px solid #333;
border-radius:20px;
padding:25px;
margin-top:20px;
box-shadow:0 0 15px rgba(255,215,0,.15);
}

.ok{
font-size:30px;
font-weight:bold;
color:#35c759;
}

.bad{
font-size:28px;
font-weight:bold;
color:#ff3b30;
}

.qr{
margin-top:20px;
display:inline-block;
background:#fff;
padding:15px;
border-radius:15px;
}

.small{
margin-top:15px;
font-size:14px;
opacity:.7;
line-height:1.5;
}
</style>
</head>

<body>

<div class="wrap">

<img src="plee's.png" class="logo">

<div class="box" id="result">
Betaling controleren...
</div>

</div>

<script>
const result = document.getElementById("result");

async function checkPayment(){

const id = new URLSearchParams(window.location.search).get("id");

if(!id){
result.innerHTML =
'<div class="bad">✖ Geen geldige betaling</div>' +
'<div class="small">Deze pagina werkt alleen na betaling.</div>';
return;
}

try{

const r = await fetch(
"https://api-atygyvzjoq-uc.a.run.app/check-payment?id=" + id
);

const data = await r.json();

if(data.paid){

result.innerHTML =
'<div class="ok">✔ Betaling ontvangen</div>' +
'<div class="small">Laat deze QR code scannen bij de toegangspoort</div>' +
'<div class="qr"><img src="https://api.qrserver.com/v1/create-qr-code/?size=220x220&data=' + id + '"></div>';

clearInterval(loop);

}else{

result.innerHTML =
'<div class="small">Betaling verwerken...</div>';

}

}catch(e){

result.innerHTML =
'<div class="bad">✖ Controle mislukt</div>';

}

}

checkPayment();

const loop = setInterval(checkPayment,2000);
</script>

</body>
</html>
