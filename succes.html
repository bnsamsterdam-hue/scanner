<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta name="theme-color" content="#000000">
<title>The Plee's To Bee</title>

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<style>
body{
margin:0;
padding:20px;
background:#000;
color:#fff;
font-family:Arial,Helvetica,sans-serif;
text-align:center;
}
.wrap{
max-width:430px;
margin:auto;
}
.logo{
width:100%;
max-width:320px;
margin:10px auto 20px;
display:block;
}
.box{
background:#111;
border:1px solid #333;
border-radius:20px;
padding:25px;
box-shadow:0 0 15px rgba(255,215,0,.15);
}
.ok{
font-size:30px;
font-weight:bold;
color:#35c759;
}
.bad{
font-size:28px;
font-weight:bold;
color:#ff3b30;
}
.small{
margin-top:12px;
font-size:14px;
opacity:.8;
line-height:1.5;
}
.qr{
margin-top:20px;
display:inline-block;
background:#fff;
padding:15px;
border-radius:15px;
}
.btn{
width:100%;
padding:15px;
margin-top:12px;
border:none;
border-radius:12px;
font-size:17px;
font-weight:bold;
cursor:pointer;
}
.gold{background:#ffd700;color:#000;}
.green{background:#35c759;color:#fff;}
.blue{background:#25d366;color:#fff;}
.topbtn{
position:sticky;
top:0;
z-index:5;
margin-bottom:15px;
}
canvas{
max-width:100%;
height:auto;
}
</style>
</head>

<body>

<div class="wrap">

<button class="btn gold topbtn" onclick="goQr()">⬇ QR</button>

<img src="plee's.png" class="logo">

<div class="box" id="result">
Betaling controleren...
</div>

</div>

<script>

const result = document.getElementById("result");
const id = new URLSearchParams(location.search).get("id");
let loop = null;
let ticketCode = "";

async function checkPayment(){

if(!id){
result.innerHTML =
'<div class="bad">Geen betaling gevonden</div>';
return;
}

try{

const r = await fetch(
"https://api-atygyvzjoq-uc.a.run.app/check-payment?id=" + id
);

const data = await r.json();

if(data.paid){

clearInterval(loop);

ticketCode = data.ticket.trim().toUpperCase().replace(/\//g,"-");

result.innerHTML =

'<div class="ok">✔ Betaling ontvangen</div>' +
'<div class="small">Laat deze QR code scannen bij toegangspoort of kassa</div>' +

'<div class="qr" id="qrblok">' +
'<canvas id="qrCanvas"></canvas>' +
'</div>' +

'<button class="btn green" onclick="downloadQr()">📥 Opslaan op telefoon</button>' +

'<button class="btn blue" onclick="shareQr()">📲 Deel via WhatsApp</button>' +

'<button class="btn gold" onclick="goQr()">⬆ Naar QR code</button>';

QRCode.toCanvas(
document.getElementById("qrCanvas"),
ticketCode,
{
width:320,
margin:2,
errorCorrectionLevel:"H"
}
);

}else{

result.innerHTML =
'<div class="small">Betaling verwerken...</div>';

}

}catch(e){

result.innerHTML =
'<div class="bad">✖ Controle mislukt</div>' +
'<div class="small">Probeer opnieuw</div>';

}

}

function goQr(){
const el = document.getElementById("qrblok");
if(el){
el.scrollIntoView({
behavior:"smooth",
block:"center"
});
}
}

function downloadQr(){

const canvas = document.getElementById("qrCanvas");
if(!canvas) return;

const a = document.createElement("a");
a.href = canvas.toDataURL("image/png");
a.download = "toilet-ticket.png";
document.body.appendChild(a);
a.click();
a.remove();

}

async function shareQr(){

const canvas = document.getElementById("qrCanvas");
if(!canvas) return;

canvas.toBlob(async function(blob){

const file = new File(
[blob],
"toilet-ticket.png",
{type:"image/png"}
);

const text =
"Laat deze QR code scannen bij toegangspoort of kassa.";

try{

if(navigator.canShare && navigator.canShare({files:[file]})){

await navigator.share({
files:[file],
text:text
});

}else{

window.open(
"https://wa.me/?text=" + encodeURIComponent(text),
"_blank"
);

}

}catch(e){
console.log(e);
}

});

}

checkPayment();
loop = setInterval(checkPayment,2000);

</script>

</body>
</html>
