<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Betaling controleren</title>

<style>
body{
margin:0;
background:#000;
color:#fff;
font-family:Arial;
text-align:center;
padding:20px;
}

.wrap{
max-width:430px;
margin:auto;
}

.logo{
width:100%;
max-width:320px;
margin:20px auto;
display:block;
}

.box{
background:#111;
border:1px solid #333;
border-radius:20px;
padding:25px;
margin-top:20px;
}

.ok{
color:#35c759;
font-size:30px;
font-weight:bold;
}

.bad{
color:#ff3b30;
font-size:30px;
font-weight:bold;
}

.qr{
margin-top:20px;
background:#fff;
padding:15px;
border-radius:15px;
display:inline-block;
}

.small{
opacity:.7;
margin-top:10px;
font-size:14px;
}
</style>
</head>

<body>

<div class="wrap">

<img src="plee's.png" class="logo">

<div class="box" id="result">
Betaling controleren...
</div>

</div>

<script>
async function checkPayment(){

const id = new URLSearchParams(window.location.search).get("id");

if(!id){
document.getElementById("result").innerHTML=
'<div class="bad">✖ Geen geldige betaling</div><div class="small">Deze pagina werkt alleen na betaling.</div>';
return;
}

try{

const r = await fetch("https://api-atygyvzjoq-uc.a.run.app/check-payment?id="+id);
const data = await r.json();

if(data.paid){

document.getElementById("result").innerHTML =
'<div class="ok">✔ Betaling ontvangen</div>' +
'<div style="margin-top:15px;font-size:20px;">Toegang actief</div>' +
'<div class="qr"><img src="https://api.qrserver.com/v1/create-qr-code/?size=220x220&data='+id+'"></div>' +
'<div class="small">Laat deze QR code scannen bij toegangspoort</div>';

}else{

document.getElementById("result").innerHTML=
'<div class="bad">✖ Nog niet betaald</div>';

}

}catch(e){

document.getElementById("result").innerHTML=
'<div class="bad">✖ Controle mislukt</div>';

}

}

checkPayment();
</script>

</body>
</html>
